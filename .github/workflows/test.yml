name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: [1.26]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}

      - name: Run linters
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3

      - name: Run tests
        run: make test

      - name: Check format
        run: make fmt && git diff --exit-code
